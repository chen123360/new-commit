<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
        }
        canvas {
            background-color: #dff9fb;
            border: 2px solid #130f40;
        }
        h1 {
            position: absolute;
            top: 10px;
            color: #130f40;
        }
    </style>
</head>
<body>
    <h1>贪吃蛇游戏</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const boxSize = 20;
        const canvasSize = 400;
        let snake = [{ x: 200, y: 200 }];
        let direction = "RIGHT";
        let food = {
            x: Math.floor(Math.random() * (canvasSize / boxSize)) * boxSize,
            y: Math.floor(Math.random() * (canvasSize / boxSize)) * boxSize,
        };
        let score = 0;

        document.addEventListener("keydown", (event) => {
            if (event.key === "w" && direction !== "DOWN") direction = "UP";
            if (event.key === "s" && direction !== "UP") direction = "DOWN";
            if (event.key === "a" && direction !== "RIGHT") direction = "LEFT";
            if (event.key === "d" && direction !== "LEFT") direction = "RIGHT";
        });

        function drawGame() {
            ctx.clearRect(0, 0, canvasSize, canvasSize);

            // Draw food
            ctx.fillStyle = "#eb4d4b";
            ctx.fillRect(food.x, food.y, boxSize, boxSize);

            // Draw snake
            ctx.fillStyle = "#6ab04c";
            snake.forEach((segment) => {
                ctx.fillRect(segment.x, segment.y, boxSize, boxSize);
            });

            // Move snake
            const head = { ...snake[0] };
            if (direction === "UP") head.y -= boxSize;
            if (direction === "DOWN") head.y += boxSize;
            if (direction === "LEFT") head.x -= boxSize;
            if (direction === "RIGHT") head.x += boxSize;

            // Check collision with walls or itself
            if (
                head.x < 0 ||
                head.x >= canvasSize ||
                head.y < 0 ||
                head.y >= canvasSize ||
                snake.some((segment) => segment.x === head.x && segment.y === head.y)
            ) {
                alert("游戏结束！得分: " + score);
                document.location.reload();
            }

            // Check if food is eaten
            if (head.x === food.x && head.y === food.y) {
                score++;
                food = {
                    x: Math.floor(Math.random() * (canvasSize / boxSize)) * boxSize,
                    y: Math.floor(Math.random() * (canvasSize / boxSize)) * boxSize,
                };
            } else {
                snake.pop();
            }

            snake.unshift(head);

            setTimeout(drawGame, 200); // Slow speed
        }

        drawGame();
    </script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #282c34;
            color: white;
            font-family: Arial, sans-serif;
        }
        #gameCanvas {
            border: 2px solid #61dafb;
            background-color: #000;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const gridSize = 20;
        const canvasSize = canvas.width;
        let snake = [{ x: 200, y: 200 }];
        let direction = { x: 0, y: 0 };
        let food = { x: 100, y: 100 };
        let gameInterval;

        function drawRect(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, gridSize, gridSize);
        }

        function drawSnake() {
            snake.forEach(segment => drawRect(segment.x, segment.y, '#61dafb'));
        }

        function drawFood() {
            drawRect(food.x, food.y, '#e63946');
        }

        function moveSnake() {
            const head = { x: snake[0].x + direction.x * gridSize, y: snake[0].y + direction.y * gridSize };
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                placeFood();
            } else {
                snake.pop();
            }
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * (canvasSize / gridSize)) * gridSize;
            food.y = Math.floor(Math.random() * (canvasSize / gridSize)) * gridSize;
        }

        function checkCollision() {
            const head = snake[0];
            if (head.x < 0 || head.x >= canvasSize || head.y < 0 || head.y >= canvasSize) {
                return true;
            }
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvasSize, canvasSize);
            moveSnake();
            if (checkCollision()) {
                clearInterval(gameInterval);
                alert('游戏结束！');
                return;
            }
            drawSnake();
            drawFood();
        }

        function changeDirection(event) {
            const key = event.key;
            if ((key === 'ArrowUp' || key === 'w') && direction.y === 0) {
                direction = { x: 0, y: -1 };
            } else if ((key === 'ArrowDown' || key === 's') && direction.y === 0) {
                direction = { x: 0, y: 1 };
            } else if ((key === 'ArrowLeft' || key === 'a') && direction.x === 0) {
                direction = { x: -1, y: 0 };
            } else if ((key === 'ArrowRight' || key === 'd') && direction.x === 0) {
                direction = { x: 1, y: 0 };
            }
        }

        document.addEventListener('keydown', changeDirection);
        placeFood();
        gameInterval = setInterval(gameLoop, 200);
    </script>
</body>
</html>
